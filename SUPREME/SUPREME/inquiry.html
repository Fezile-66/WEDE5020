<h2>Inquiry</h2>

<h3>Inquiry Form</h3>


<form id="inquiryForm" novalidate>

<label for="fullname">Full Name:</label><br>
<input type="text" name="fullname" id="fullname" required minlength="2"><br><br>

<label for="email">Email:</label><br>
<input type="email" name="email" id="email" required><br><br>

<label for="subject">Subject:</label><br>
<select name="subject" id="subject" required>
    <option value="">Please select...</option>
    <option value="wholesale">Wholesale / Stockist</option>
    <option value="press">Press / Media</option>
    <option value="collaboration">Collaboration / Partnership</option>
    <option value="returns">Returns / Exchange</option>
    <option value="volunteer">Volunteer / Community</option>
    <option value="sponsor">Sponsorship / Donation</option>
    <option value="other">Other</option>
</select><br><br>

<label for="message">Message:</label><br>
<textarea name="message" id="message" rows="5" cols="40" required minlength="10"></textarea><br><br>

<input type="submit" value="Submit Inquiry">
</form>

<br>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('inquiryForm');
    const formResponse = document.getElementById('formResponse');
    
    // Get form fields
    const fullname = document.getElementById('fullname');
    const email = document.getElementById('email');
    const phone = document.getElementById('phone');
    const subject = document.getElementById('subject');
    const message = document.getElementById('message');
    const charCount = document.getElementById('charCount');
    
    // Character counter
    if (message && charCount) {
        message.addEventListener('input', function() {
            charCount.textContent = this.value.length;
        });
    }
    
    // Error message elements
    const fullnameError = document.getElementById('fullnameError');
    const emailError = document.getElementById('emailError');
    const phoneError = document.getElementById('phoneError');
    const subjectError = document.getElementById('subjectError');
    const messageError = document.getElementById('messageError');
    
    // Validation function
    function validateField(field, errorSpan, validator, errorMsg) {
        const value = field.value.trim();
        
        // Required field check
        if (field.hasAttribute('required') && !value) {
            errorSpan.textContent = 'This field is required.';
            errorSpan.style.display = 'block';
            field.classList.add('error');
            field.classList.remove('success');
            return false;
        }
        
        // Custom validator
        if (validator && value && !validator(value)) {
            errorSpan.textContent = errorMsg;
            errorSpan.style.display = 'block';
            field.classList.add('error');
            field.classList.remove('success');
            return false;
        }
        
        // All valid
        errorSpan.style.display = 'none';
        field.classList.remove('error');
        field.classList.add('success');
        return true;
    }
    
    // Validator functions
    function isValidEmail(value) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
    }
    
    function isValidPhone(value) {
        return /^[\+\d\s\-\(\)]{7,20}$/.test(value);
    }
    
    function isValidMessage(value) {
        return value.length >= 10;
    }
    
    // Real-time validation on blur
    fullname.addEventListener('blur', function() {
        validateField(this, fullnameError, null, '');
    });
    
    email.addEventListener('blur', function() {
        validateField(this, emailError, isValidEmail, 'Please enter a valid email address.');
    });
    
    phone.addEventListener('blur', function() {
        if (this.value.trim()) {
            validateField(this, phoneError, isValidPhone, 'Please enter a valid phone number.');
        } else {
            phoneError.style.display = 'none';
            this.classList.remove('error');
            this.classList.remove('success');
        }
    });
    
    subject.addEventListener('blur', function() {
        validateField(this, subjectError, null, '');
    });
    
    message.addEventListener('blur', function() {
        validateField(this, messageError, isValidMessage, 'Message must be at least 10 characters.');
    });
    
    // Form submission
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        // Validate all fields
        const nameValid = validateField(fullname, fullnameError, null, '');
        const emailValid = validateField(email, emailError, isValidEmail, 'Please enter a valid email address.');
        const phoneValid = phone.value.trim() ? validateField(phone, phoneError, isValidPhone, 'Please enter a valid phone number.') : true;
        const subjectValid = validateField(subject, subjectError, null, '');
        const messageValid = validateField(message, messageError, isValidMessage, 'Message must be at least 10 characters.');
        
        if (nameValid && emailValid && phoneValid && subjectValid && messageValid) {
            // Show loading
            formResponse.className = 'form-response loading';
            formResponse.textContent = 'Processing your enquiry...';
            formResponse.style.display = 'block';
            
            // Simulate server response
            setTimeout(function() {
                const subjectValue = subject.value;
                let responseMsg = '';
                
                switch(subjectValue) {
                    case 'wholesale':
                        responseMsg = 'Thank you for your wholesale enquiry. Our distribution team will contact you within 3 business days.';
                        break;
                    case 'press':
                        responseMsg = 'Thank you for your press enquiry. A member of our PR team will respond within 24-48 hours.';
                        break;
                    case 'collaboration':
                        responseMsg = 'Thank you for your collaboration enquiry. We review partnership opportunities monthly.';
                        break;
                    case 'returns':
                        responseMsg = 'Thank you for your returns enquiry. Please include your order number for faster processing.';
                        break;
                    case 'volunteer':
                        responseMsg = 'Thank you for your interest in volunteering with Supreme Community Initiatives.';
                        break;
                    case 'sponsor':
                        responseMsg = 'Thank you for your sponsorship enquiry. Our partnerships team will review your proposal.';
                        break;
                    default:
                        responseMsg = 'Thank you for your enquiry. We will respond within 48 hours.';
                }
                
                formResponse.className = 'form-response success';
                formResponse.innerHTML = `
                    <strong> Inquiry Submitted Successfully!</strong><br>
                    ${responseMsg}
                    <br><small>Reference: #${Math.random().toString(36).substring(2, 8).toUpperCase()}</small>
                    <br><small>We will contact you at: ${email.value}</small>
                `;
                formResponse.style.display = 'block';
                
                // Reset form after 5 seconds
                setTimeout(function() {
                    form.reset();
                    document.querySelectorAll('input, select, textarea').forEach(el => {
                        el.classList.remove('success', 'error');
                    });
                    if (charCount) charCount.textContent = '0';
                    formResponse.style.display = 'none';
                }, 5000);
                
            }, 2000);
            
        } else {
            // Show error
            formResponse.className = 'form-response error';
            formResponse.textContent = 'Please fix the errors above before submitting.';
            formResponse.style.display = 'block';
            
            setTimeout(function() {
                formResponse.style.display = 'none';
            }, 4000);
        }
    });
});
</script>

</body>
